# ==========================================
# 开发环境配置
# ==========================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/career_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # SQL 初始化（首次启动时执行 init.sql）
  sql:
    init:
      mode: never
      continue-on-error: true

# 日志级别
logging:
  level:
    com.xuelian.career: debug
    org.springframework.web: info

# DeepSeek API Key（开发环境直接配置，避免依赖系统环境变量）
deepseek:
  api-key: sk-2ddff53c02ff4448a4172b64f26ea784
